<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terras in de Zon</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e4e4ee; min-height: 100vh; padding: 0 0 60px; }

  .topbar { background: #18181f; border-bottom: 1px solid #2a2a3a; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 1rem; font-weight: 700; color: #f5a623; letter-spacing: -0.02em; }
  .logo span { color: #7a7aaa; font-weight: 400; }

  .time-bar { padding: 16px 20px; background: #13131a; border-bottom: 1px solid #1e1e28; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .time-bar label { font-size: 0.75rem; color: #7a7aaa; white-space: nowrap; }
  input[type="datetime-local"] { background: #18181f; border: 1px solid #2a2a3a; border-radius: 8px; color: #e4e4ee; font-size: 0.85rem; padding: 7px 12px; outline: none; font-family: inherit; flex: 1; min-width: 180px; }
  input[type="datetime-local"]:focus { border-color: #f5a623; }
  .calc-btn { background: #f5a623; color: #1a0e00; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .calc-btn:hover { opacity: 0.88; }
  .now-btn { background: #1e1e28; color: #7a7aaa; border: 1px solid #2a2a3a; border-radius: 8px; padding: 8px 14px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .now-btn:hover { border-color: #f5a623; color: #f5a623; }

  .sun-banner { margin: 16px 20px; background: #18181f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 16px 18px; display: none; }
  .sun-banner.visible { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .sun-icon { font-size: 28px; }
  .sun-info { flex: 1; min-width: 160px; }
  .sun-main { font-size: 1rem; font-weight: 700; color: #f5a623; margin-bottom: 2px; }
  .sun-main.down { color: #4a4a6a; }
  .sun-detail { font-size: 0.75rem; color: #5a5a7a; }
  .weather-pill { font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; background: #0f0f13; border: 1px solid #2a2a3a; color: #7a7aaa; white-space: nowrap; }

  .city-section { margin: 20px 20px 6px; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: #4a4a6a; border-bottom: 1px solid #1e1e28; padding-bottom: 6px; }
  .list-header { padding: 8px 20px 6px; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #3a3a5a; }

  .terrace-card { margin: 0 20px 10px; background: #18181f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 16px; transition: border-color 0.15s; }
  .terrace-card:hover { border-color: #3a3a5a; }
  .terrace-card.sunny   { border-left: 3px solid #f5a623; }
  .terrace-card.partial { border-left: 3px solid #8a6a20; }
  .terrace-card.shaded  { border-left: 3px solid #2a2a4a; }
  .terrace-card.down    { border-left: 3px solid #1e1e2e; opacity: 0.5; }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-size: 0.92rem; font-weight: 600; color: #e4e4ee; }
  .card-desc { font-size: 0.75rem; color: #5a5a7a; margin-top: 2px; }
  .status-pill { font-size: 0.68rem; font-weight: 700; padding: 4px 11px; border-radius: 20px; letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; margin-left: 8px; }
  .status-pill.sunny   { background: rgba(245,166,35,0.15); color: #f5a623; }
  .status-pill.partial { background: rgba(180,120,30,0.15); color: #c8902a; }
  .status-pill.shaded  { background: rgba(60,60,100,0.3);   color: #6a6a9a; }
  .status-pill.down    { background: rgba(30,30,50,0.5);    color: #3a3a5a; }

  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag { font-size: 0.68rem; background: #0f0f13; border: 1px solid #1e1e28; border-radius: 6px; padding: 2px 8px; color: #4a4a6a; }
  .meta-tag.shade-warn { border-color: #3a2a1a; color: #7a5a2a; }

  .loading { text-align: center; padding: 60px 20px; color: #3a3a5a; font-size: 0.85rem; }
  .error-msg { margin: 20px; background: #1e1010; border: 1px solid #3a1a1a; border-radius: 10px; padding: 16px; color: #aa5a5a; font-size: 0.82rem; line-height: 1.6; }
  .empty { text-align: center; padding: 40px 20px; color: #3a3a5a; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">terras<span>indezon</span></div>
</div>

<div class="time-bar">
  <label>Check for:</label>
  <input type="datetime-local" id="dt">
  <button class="now-btn" onclick="setNow()">Now</button>
  <button class="calc-btn" onclick="run()">Find sunny terraces</button>
</div>

<div class="sun-banner" id="sun-banner">
  <div class="sun-icon" id="sun-icon"></div>
  <div class="sun-info">
    <div class="sun-main" id="sun-main"></div>
    <div class="sun-detail" id="sun-detail"></div>
  </div>
  <div class="weather-pill" id="weather-pill"></div>
</div>

<div id="list-area"><div class="empty">Pick a time and hit "Find sunny terraces"</div></div>

<script>
const AIRTABLE_TOKEN   = 'patg7yR2DQsMb6BpS.f98e7570cf71e68555e298d78a11bd346053f175beaf78413d4a07b636152f14';
const AIRTABLE_BASE_ID = 'appqgDqaabs6MjuAd';
const AIRTABLE_TABLE   = 'Terraces';

const D = Math.PI/180, R = 180/Math.PI;

// ── THE FIX: use the browser's own UTC offset for the chosen local time ──────
// This avoids all DST hardcoding and works correctly on Windows
function localToUTC(yr, mo, dy, lh, lm) {
  // Create a Date object representing this local wall-clock time
  const local = new Date(yr, mo-1, dy, lh, lm, 0);
  // getTimezoneOffset() returns minutes BEHIND UTC (negative for UTC+2)
  const offsetMin = local.getTimezoneOffset(); // e.g. -120 for CEST
  const utcMs = local.getTime() + offsetMin * 60000;
  const utc = new Date(utcMs);
  return {
    utcH:  utc.getUTCHours(),
    utcM:  utc.getUTCMinutes(),
    utcD:  utc.getUTCDate(),
    utcMo: utc.getUTCMonth() + 1,
    utcYr: utc.getUTCFullYear(),
    offsetHours: -offsetMin / 60
  };
}

// ── Julian Day from UTC components ───────────────────────────────────────────
function toJD(y, mo, d, h, mn) {
  const a = Math.floor((14-mo)/12), yy = y+4800-a, mm = mo+12*a-3;
  const jdn = d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
  return jdn - 0.5 + h/24 + mn/1440;
}

// ── NOAA sun position — takes lat/lng and UTC time explicitly ────────────────
function sunPos(lat, lng, utcYr, utcMo, utcD, utcH, utcM) {
  const j  = toJD(utcYr, utcMo, utcD, utcH, utcM);
  const jc = (j - 2451545.0) / 36525;

  const L0 = (280.46646+jc*(36000.76983+jc*0.0003032))%360;
  const M  = 357.52911+jc*(35999.05029-0.0001537*jc);
  const C  = Math.sin(M*D)*(1.914602-jc*(0.004817+0.000014*jc))
           + Math.sin(2*M*D)*(0.019993-0.000101*jc)
           + Math.sin(3*M*D)*0.000289;
  const sl = L0+C;
  const om = 125.04-1934.136*jc;
  const la = sl-0.00569-0.00478*Math.sin(om*D);
  const e0 = 23+(26+(21.448-jc*(46.815+jc*(0.00059-jc*0.001813)))/60)/60;
  const ep = e0+0.00256*Math.cos(om*D);
  const dc = Math.asin(Math.sin(ep*D)*Math.sin(la*D))*R;

  const t2  = Math.tan((ep/2)*D)**2;
  const eot = 4*R*(t2*Math.sin(2*L0*D)
    - 2*0.016708634*Math.sin(M*D)
    + 4*0.016708634*t2*Math.sin(M*D)*Math.cos(2*L0*D)
    - 0.5*t2**2*Math.sin(4*L0*D)
    - 1.25*0.016708634**2*Math.sin(2*M*D));

  const tst = (utcH*60 + utcM + eot + 4*lng + 1440) % 1440;
  let ha = tst/4 - 180;
  if (ha < -180) ha += 360;

  const lr=lat*D, dr=dc*D, hr=ha*D;
  const cz = Math.sin(lr)*Math.sin(dr)+Math.cos(lr)*Math.cos(dr)*Math.cos(hr);
  const ze = Math.acos(Math.min(1,Math.max(-1,cz)))*R;
  const alt = 90-ze;

  const ca = (Math.sin(lr)*cz-Math.sin(dr))/(Math.cos(lr)*Math.sin(ze*D));
  let az = Math.acos(Math.min(1,Math.max(-1,ca)))*R;
  if (ha > 0) az = 360-az;

  return {alt, az};
}

// Convenience wrapper: takes local time, converts to UTC, calls sunPos
function sunPosLocal(lat, lng, yr, mo, dy, lh, lm) {
  const u = localToUTC(yr, mo, dy, lh, lm);
  return sunPos(lat, lng, u.utcYr, u.utcMo, u.utcD, u.utcH, u.utcM);
}

function findSunset(lat, lng, yr, mo, dy) {
  let last = sunPosLocal(lat, lng, yr, mo, dy, 12, 0).alt;
  for (let m = 1; m <= 720; m++) {
    const h = 12+Math.floor(m/60), mn = m%60;
    if (h >= 24) break;
    const a = sunPosLocal(lat, lng, yr, mo, dy, h, mn).alt;
    if (last > 0 && a <= 0) return {h, mn};
    last = a;
  }
  return null;
}

function compassDir(az) {
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(az/22.5)%16];
}

// ── Building shade + cloud rating ────────────────────────────────────────────
function isBuildingShaded(sunAlt, sunAz, shadeDir, shadeMinAlt) {
  if (!shadeDir || !shadeMinAlt) return false;
  let diff = Math.abs(sunAz - shadeDir);
  if (diff > 180) diff = 360-diff;
  return diff <= 45 && sunAlt < shadeMinAlt;
}

function rateTerrace(sunAlt, sunAz, cloudCover, facing, shadeDir, shadeMinAlt) {
  if (sunAlt <= 0) return {label:'down', reason:'Sun below horizon'};
  if (sunAlt < 5)  return {label:'shaded', reason:'Sun too low'};

  if (isBuildingShaded(sunAlt, sunAz, shadeDir, shadeMinAlt))
    return {label:'shaded', reason:`Building blocks sun until it rises above ${shadeMinAlt}°`};

  let diff = Math.abs(sunAz - facing);
  if (diff > 180) diff = 360-diff;

  let base = diff <= 45 ? 'sunny' : diff <= 70 ? 'partial' : 'shaded';
  if (base === 'shaded') return {label:'shaded', reason:'Sun is behind this terrace'};

  if (cloudCover >= 80) return {label:'shaded', reason:'Heavy cloud cover'};
  if (cloudCover >= 50 && base === 'partial') return {label:'shaded', reason:`Partial angle + ${cloudCover}% cloud`};
  if (cloudCover >= 50) return {label:'partial', reason:`${cloudCover}% cloud cover`};

  return {label: base, reason: base === 'sunny' ? 'Direct sunlight' : 'Partial sunlight'};
}

// ── Airtable ─────────────────────────────────────────────────────────────────
async function fetchTerraces() {
  const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}?filterByFormula={active}=1&maxRecords=100`;
  const res = await fetch(url, {headers:{Authorization:`Bearer ${AIRTABLE_TOKEN}`}});
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Airtable ${res.status}: ${txt}`);
  }
  const data = await res.json();
  return data.records.map(r => ({
    name:               r.fields.name || r.fields.Name || '?',
    lat:                parseFloat(r.fields.lat)  || 0,
    lng:                parseFloat(r.fields.lng)  || 0,
    facing:             parseInt(r.fields.facing) || 180,
    shade_direction:    parseInt(r.fields.shade_direction)    || 0,
    shade_min_altitude: parseInt(r.fields.shade_min_altitude) || 0,
    description:        r.fields.description || '',
  }));
}

// ── Open-Meteo — fetch for a specific lat/lng ─────────────────────────────────
async function fetchWeather(lat, lng, isoDatetime) {
  const date = isoDatetime.slice(0,10);
  const hour = parseInt(isoDatetime.slice(11,13));
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=cloudcover,weathercode&start_date=${date}&end_date=${date}&timezone=auto`;
  try {
    const res = await fetch(url);
    if (!res.ok) return {cloudCover:0, description:'Weather unavailable'};
    const data = await res.json();
    const idx = Math.min(hour, data.hourly.cloudcover.length-1);
    const cc  = data.hourly.cloudcover[idx] ?? 0;
    const wc  = data.hourly.weathercode[idx] ?? 0;
    return {cloudCover: cc, description: weatherDesc(wc, cc)};
  } catch {
    return {cloudCover:0, description:'Weather unavailable'};
  }
}

function weatherDesc(code, cc) {
  if (code === 0) return 'Clear sky';
  if (code <= 3)  return cc > 50 ? 'Mostly cloudy' : 'Partly cloudy';
  if (code <= 48) return 'Foggy';
  if (code <= 67) return 'Rain';
  if (code <= 77) return 'Snow';
  if (code <= 82) return 'Showers';
  return 'Stormy';
}

// ── Group terraces by city (cluster by coordinates) ──────────────────────────
function cityName(lat, lng) {
  if (lat > 52 && lat < 53 && lng > 4 && lng < 6)   return 'Amsterdam';
  if (lat > 41 && lat < 42 && lng > 1 && lng < 3)   return 'Barcelona';
  if (lat > 45 && lat < 46 && lng > 9 && lng < 10)  return 'Milan';
  return 'Other';
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setNow() {
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  document.getElementById('dt').value =
    `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}T${p(now.getHours())}:${p(now.getMinutes())}`;
}

const ORDER = ['sunny','partial','shaded','down'];

async function run() {
  const v = document.getElementById('dt').value;
  if (!v) { alert('Pick a date and time.'); return; }

  document.getElementById('list-area').innerHTML = '<div class="loading">Fetching terraces and weather…</div>';
  document.getElementById('sun-banner').className = 'sun-banner';

  const [dp, tp] = v.split('T');
  const [yr, mo, dy] = dp.split('-').map(Number);
  const [lh, lm]     = tp.split(':').map(Number);

  // Sun position for Amsterdam (primary city display)
  const AMS_LAT = 52.3676, AMS_LNG = 4.9041;
  const {alt: amsAlt, az: amsAz} = sunPosLocal(AMS_LAT, AMS_LNG, yr, mo, dy, lh, lm);
  const sunUp = amsAlt > 0;

  // Sun banner
  const banner = document.getElementById('sun-banner');
  banner.className = 'sun-banner visible';
  document.getElementById('sun-icon').textContent = sunUp ? '☀️' : '🌙';
  const mainEl = document.getElementById('sun-main');
  mainEl.textContent = sunUp
    ? `Amsterdam: sun from ${compassDir(amsAz)} — ${Math.round(amsAlt)}° above horizon`
    : 'Sun is below the horizon in Amsterdam';
  mainEl.className = 'sun-main'+(sunUp?'':' down');

  const ss = findSunset(AMS_LAT, AMS_LNG, yr, mo, dy);
  if (ss && sunUp) {
    const diff = (ss.h*60+ss.mn)-(lh*60+lm);
    const hh = Math.floor(diff/60), mm = diff%60;
    document.getElementById('sun-detail').textContent = `Sunset in ${hh>0?hh+'h ':''}${mm}m`;
  } else {
    document.getElementById('sun-detail').textContent = sunUp ? '' : 'No direct sun at this time';
  }
  document.getElementById('weather-pill').textContent = 'Loading weather…';

  // Fetch terraces
  let terraces;
  try {
    terraces = await fetchTerraces();
  } catch(e) {
    document.getElementById('list-area').innerHTML =
      `<div class="error-msg">Could not load terraces from Airtable.<br><br>${e.message}</div>`;
    return;
  }

  // Group by city
  const cities = {};
  terraces.forEach(t => {
    const city = cityName(t.lat, t.lng);
    if (!cities[city]) cities[city] = [];
    cities[city].push(t);
  });

  // Fetch weather per city in parallel
  const isoHour = `${dp}T${String(lh).padStart(2,'0')}:00`;
  const cityKeys = Object.keys(cities);
  const weatherMap = {};
  await Promise.all(cityKeys.map(async city => {
    const sample = cities[city][0];
    weatherMap[city] = await fetchWeather(sample.lat, sample.lng, isoHour);
  }));

  // Update weather pill with Amsterdam weather
  const amsWeather = weatherMap['Amsterdam'] || {cloudCover:0, description:'—'};
  document.getElementById('weather-pill').textContent =
    `Amsterdam: ${amsWeather.description} · ${amsWeather.cloudCover}% cloud`;

  // Rate all terraces
  Object.keys(cities).forEach(city => {
    const w = weatherMap[city] || {cloudCover:0};
    cities[city] = cities[city].map(t => {
      const {alt, az} = sunPosLocal(t.lat, t.lng, yr, mo, dy, lh, lm);
      const rating = rateTerrace(alt, az, w.cloudCover, t.facing, t.shade_direction, t.shade_min_altitude);
      return {...t, ...rating, sunAlt: alt, sunAz: az};
    }).sort((a,b) => ORDER.indexOf(a.label)-ORDER.indexOf(b.label));
  });

  // Render
  const area = document.getElementById('list-area');
  area.innerHTML = '';

  const cityOrder = ['Amsterdam','Barcelona','Milan','Other'];
  cityOrder.forEach(city => {
    if (!cities[city] || cities[city].length === 0) return;
    const list = cities[city];
    const sunnyCount = list.filter(t => t.label==='sunny').length;
    const w = weatherMap[city] || {cloudCover:0, description:'—'};

    const header = document.createElement('div');
    header.className = 'city-section';
    header.innerHTML = `${city} &nbsp;·&nbsp; ${w.description} · ${w.cloudCover}% cloud &nbsp;·&nbsp; ${sunnyCount} in sun`;
    area.appendChild(header);

    list.forEach(t => {
      const hasShade = t.shade_direction && t.shade_min_altitude;
      const card = document.createElement('div');
      card.className = `terrace-card ${t.label}`;
      card.innerHTML = `
        <div class="card-top">
          <div>
            <div class="card-name">${t.name}</div>
            ${t.description ? `<div class="card-desc">${t.description}</div>` : ''}
          </div>
          <span class="status-pill ${t.label}">${t.label}</span>
        </div>
        <div class="card-meta">
          <span class="meta-tag">Faces ${compassDir(t.facing)}</span>
          <span class="meta-tag">${t.reason}</span>
          ${hasShade ? `<span class="meta-tag shade-warn">Building shade from ${compassDir(t.shade_direction)} below ${t.shade_min_altitude}°</span>` : ''}
        </div>`;
      area.appendChild(card);
    });
  });
}

setNow();
</script>
</body>
</html>
